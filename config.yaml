# ============================================================================
# 寻欢阁爬虫 全局环境配置文件
# ============================================================================

# ============================================================================
# ★ 目标任务配置（修改此处即可，然后运行: python3 xhg_scraper.py run）
#
# 采集流程：根据城市 area 代码构造筛选 URL → 翻列表页 → 逐个详情页 → 解析输出
# ============================================================================
target:
  # 要抓取的城市（从下方 cities 表中查找 area 代码，如 "南京市"，留空=不限）
  city: "南京市"
  # 省份（仅作元数据标记，不影响筛选）
  region: "江苏省"
  # 论坛板块: "最新信息" / "自荐认证" / "包养专区"
  forum: "最新信息"
  # 列表页翻页数（每页约20条）
  pages: 1
  # 最多抓取多少条（0=不限制）
  max_threads: 10

# 网站基础URL
base_url: "https://xhg20260430.xhg303.one/"

# --------------------------------------------------------------------------
# 论坛板块
# --------------------------------------------------------------------------
forums:
  最新信息:
    fid: 2
    list_url: "forum.php?mod=forumdisplay&fid=2"
  自荐认证:
    fid: 47
    list_url: "forum.php?mod=forumdisplay&fid=47"
  包养专区:
    fid: 40
    list_url: "forum.php?mod=forumdisplay&fid=40"

# --------------------------------------------------------------------------
# 城市 area 代码（用于构造地区筛选 URL）
# 格式: forum.php?mod=forumdisplay&fid=X&filter=sortid&sortid=3&searchsort=1&area=代码
# 代码可从浏览器点击首页热门城市后的 URL 中获取
# --------------------------------------------------------------------------
cities:
  南京市: "6.1"

# --------------------------------------------------------------------------
# 可选省份（用于页面点击筛选，name 须与页面文字一致）
# --------------------------------------------------------------------------
regions:
  - name: "不限"
    code: ""
  - name: "北京市"
    code: "beijing"
  - name: "上海市"
    code: "shanghai"
  - name: "天津市"
    code: "tianjin"
  - name: "重庆市"
    code: "chongqing"
  - name: "广东省"
    code: "guangdong"
  - name: "江苏省"
    code: "jiangsu"
  - name: "山东省"
    code: "shandong"
  - name: "浙江省"
    code: "zhejiang"
  - name: "四川省"
    code: "sichuan"
  - name: "河南省"
    code: "henan"
  - name: "福建省"
    code: "fujian"
  - name: "安徽省"
    code: "anhui"
  - name: "湖北省"
    code: "hubei"
  - name: "陕西省"
    code: "shaanxi"
  - name: "山西省"
    code: "shanxi"
  - name: "湖南省"
    code: "hunan"
  - name: "江西省"
    code: "jiangxi"
  - name: "广西"
    code: "guangxi"
  - name: "贵州省"
    code: "guizhou"
  - name: "云南省"
    code: "yunnan"
  - name: "河北省"
    code: "hebei"
  - name: "辽宁省"
    code: "liaoning"
  - name: "吉林省"
    code: "jilin"
  - name: "黑龙江省"
    code: "heilongjiang"
  - name: "甘肃省"
    code: "gansu"
  - name: "新疆"
    code: "xinjiang"
  - name: "宁夏"
    code: "ningxia"
  - name: "内蒙古"
    code: "neimenggu"
  - name: "西藏"
    code: "xizang"
  - name: "海南省"
    code: "hainan"
  - name: "青海省"
    code: "qinghai"
  - name: "香港"
    code: "hongkong"
  - name: "台湾"
    code: "taiwan"
  - name: "澳门"
    code: "macau"

# --------------------------------------------------------------------------
# 详情页提取字段
# --------------------------------------------------------------------------
detail_fields:
  - name: "小姐年龄"
    key: "age"
    pattern: "小姐年龄[：:]\\s*(\\d+)"
  - name: "小姐颜值"
    key: "beauty_score"
    pattern: "小姐颜值[：:]\\s*(\\d+)"
  - name: "消费水平"
    key: "price_range"
    pattern: "消费水平[：:]\\s*([\\d,-]+)"
  - name: "服务项目"
    key: "services"
    pattern: "服务项目[：:]\\s*(.+?)(?:联系方式|\\n\\n|\\Z)"
  - name: "与你号"
    key: "yuni_id"
    pattern: "与你号[：:]\\s*([a-zA-Z0-9_-]+)"
  - name: "电报号"
    key: "telegram"
    pattern: "电报号[：:]\\s*(@?[a-zA-Z0-9_-]+)"
  - name: "QQ"
    key: "qq"
    pattern: "(?:QQ[：:]|[Qq]{2}号[：:])\\s*(\\d+)"
  - name: "微信"
    key: "wechat"
    pattern: "微信[：:]\\s*([a-zA-Z0-9_-]+)"
  - name: "电话号码"
    key: "phone"
    pattern: "(?:电话号码|手机|电话)[：:]\\s*(\\d[\\d\\s-]{6,})"
  - name: "详细地址"
    key: "address"
    pattern: "详细地址[：:]\\s*(.+?)(?:\\n|$)"

# --------------------------------------------------------------------------
# 采集参数
# --------------------------------------------------------------------------
crawl:
  output_dir: "output"
  delay: 1.5
  timeout: 60000
  use_headless: true
