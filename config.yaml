# ============================================================================
# 寻欢阁爬虫 全局环境配置文件
# 功能：定义可选的地区、论坛板块、采集参数等全局配置
# ============================================================================

# ============================================================================
# ★ 目标任务配置（修改此处即可，然后运行: python xhg_scraper.py run）
# ============================================================================
target:
  # 要抓取的省份名称（从下方 regions 列表中选一个，如 "广东省"、"北京市"）
  region: ""
  # 要抓取的论坛板块（"最新信息"、"自荐认证"、"包养专区"）
  forum: "最新信息"
  # 列表页翻页数量（每页约20条）
  pages: 1
  # 最多抓取多少条详情（0=不限制）
  max_threads: 0

# 网站基础URL
base_url: "https://xhg20260430.xhg303.one/"

# --------------------------------------------------------------------------
# 论坛板块定义（fid 对应论坛版块ID）
# --------------------------------------------------------------------------
forums:
  最新信息:
    fid: 2
    list_url: "forum.php?mod=forumdisplay&fid=2"
    description: "最新发布的信息列表"
  自荐认证:
    fid: 47
    list_url: "forum.php?mod=forumdisplay&fid=47"
    description: "用户自荐认证信息"
  包养专区:
    fid: 40
    list_url: "forum.php?mod=forumdisplay&fid=40"
    description: "包养相关专区"

