# ============================================================================
# 寻欢阁爬虫 全局环境配置文件
# ============================================================================

# ============================================================================
# ★ 目标任务配置（修改此处即可，然后运行: python3 xhg_scraper.py run）
#
# 采集流程：根据城市 area 代码构造筛选 URL → 翻列表页 → 逐个详情页 → 解析输出
# ============================================================================
target:
  # 要抓取的城市（需在下方 cities 表中配置后缀，留空=不限）
  city: ""
  # 省份/地区（如"北京市"、"江苏省"，area 根据 regions 列表顺序自动计算）
  region: "北京市"
  # 论坛板块: "最新信息" / "自荐认证" / "包养专区"
  forum: "最新信息"
  # ★ 翻页方式（二选一）：
  #   pages=N    → 抓取前 N 页（curpage 必须为 0）
  #   curpage=N  → 只抓取第 N 页（pages 必须为 0）
  pages: 2
  curpage: 0
  # 最多抓取多少条（0=不限制，到达上限后自动停止翻页）
  max_threads: 0

# 网站基础URL
base_url: "https://xhg20260430.xhg303.one/"

# --------------------------------------------------------------------------
# 论坛板块
# --------------------------------------------------------------------------
forums:
  最新信息:
    fid: 2
    list_url: "forum.php?mod=forumdisplay&fid=2"
  自荐认证:
    fid: 47
    list_url: "forum.php?mod=forumdisplay&fid=47"
  包养专区:
    fid: 40
    list_url: "forum.php?mod=forumdisplay&fid=40"

# --------------------------------------------------------------------------
# 地区配置文件路径（包含省份 + 城市的完整配置）
# 详见 regions.yaml
# --------------------------------------------------------------------------
regions_file: "regions.yaml"

# --------------------------------------------------------------------------
# 详情页提取字段
# --------------------------------------------------------------------------
detail_fields:
  - name: "小姐年龄"
    key: "age"
    pattern: "小姐年龄[：:]\\s*(\\d+)"
  - name: "小姐颜值"
    key: "beauty_score"
    pattern: "小姐颜值[：:]\\s*(\\d+)"
  - name: "消费水平"
    key: "price_range"
    pattern: "消费水平[：:]\\s*([\\d,-]+)"
  - name: "服务项目"
    key: "services"
    pattern: "服务项目[：:]\\s*(.+?)(?:联系方式|\\n\\n|\\Z)"
  - name: "与你号"
    key: "yuni_id"
    pattern: "与你号[：:]\\s*([a-zA-Z0-9_-]+(?:\\s*[或、,，]\\s*[a-zA-Z0-9_-]+)*)"
  - name: "电报号"
    key: "telegram"
    pattern: "电报号[：:]\\s*(@?[a-zA-Z0-9_-]+)"
  - name: "QQ"
    key: "qq"
    pattern: "(?i)(?:qq)(?:号)?(?:/微信)?[：:]\\s*(\\d+(?:\\s*[或、,，]\\s*\\d+)*)|(?<!\\w)qq(\\d{5,})"
  - name: "微信"
    key: "wechat"
    pattern: "(?:QQ/)?微信[：:]\\s*(\\S+(?:\\s*[或、,，]\\s*\\S+)*)"
  - name: "QQ/微信原文"
    key: "qq_wechat"
    pattern: "QQ/微信[：:]\\s*(.+?)(?:\\n\\s*(?:联系方式|电话|手机|与你|电报|QQ号|微信|详细地址|详情介绍|我要举报|我要收藏|$\\s*$))"
  - name: "电话号码"
    key: "phone"
    pattern: "(?:电话号码|手机|电话)[：:]\\s*(\\d[\\d\\s-]{6,})"
  - name: "详细地址"
    key: "address"
    pattern: "详细地址[：:]\\s*(.+?)(?:\\n|$)"

# --------------------------------------------------------------------------
# 采集参数
# --------------------------------------------------------------------------
crawl:
  output_dir: "output"
  delay: 1.5
  timeout: 60000
  use_headless: true
