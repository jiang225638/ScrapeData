# --------------------------------------------------------------------------
# 详情页提取字段定义
# --------------------------------------------------------------------------
detail_fields:
  - name: "小姐年龄"
    key: "age"
    pattern: "小姐年龄[：:]\\s*(\\d+)"
  - name: "小姐颜值"
    key: "beauty_score"
    pattern: "小姐颜值[：:]\\s*(\\d+)分"
  - name: "消费水平"
    key: "price_range"
    pattern: "消费水平[：:]\\s*([\\d,-]+)"
  - name: "服务项目"
    key: "services"
    pattern: "服务项目[：:]\\s*(.+?)(?:联系方式|\\n\\n|\\Z)"
  - name: "所属地区"
    key: "region"
    pattern: "([^\\s\\u00bb]+)\\s*\\u00bb\\s*([^\\s]+)"
  - name: "与你号"
    key: "yuni_id"
    pattern: "与你号[：:]\\s*([a-zA-Z0-9_-]+)"
  - name: "电报号"
    key: "telegram"
    pattern: "电报号[：:]\\s*(@?[a-zA-Z0-9_-]+)"
  - name: "QQ"
    key: "qq"
    pattern: "(?<!电报)QQ[：:]\\s*(\\d+)"
  - name: "微信"
    key: "wechat"
    pattern: "微信[：:]\\s*([a-zA-Z0-9_-]+)"
  - name: "电话号码"
    key: "phone"
    pattern: "(?:电话号码|手机|电话)[：:]\\s*(\\d[\\d\\s-]{6,})"
  - name: "详细地址"
    key: "address"
    pattern: "详细地址[：:]\\s*(.+?)(?:\\n|$)"

# --------------------------------------------------------------------------
# 采集参数默认值
# --------------------------------------------------------------------------
crawl:
  output_dir: "output"
  delay: 1.5
  timeout: 60000
  max_threads: 0
  pages: 1
  use_headless: true
